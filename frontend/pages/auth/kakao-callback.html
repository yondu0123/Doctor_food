<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카카오 로그인 중... | 닥터푸드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #f8fffb 0%, #f5f8f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .callback-container {
      text-align: center;
      background: white;
      padding: 48px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      max-width: 400px;
      width: 100%;
    }
    
    .spinner {
      width: 64px;
      height: 64px;
      border: 6px solid #e5e7eb;
      border-top-color: #FEE500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .callback-title {
      font-size: 20px;
      font-weight: 700;
      color: #14532d;
      margin-bottom: 8px;
    }
    
    .callback-message {
      font-size: 14px;
      color: #6b7280;
    }
    
    .error-container {
      display: none;
    }
    
    .error-container.show {
      display: block;
    }
    
    .error-icon {
      font-size: 48px;
      color: #ef4444;
      margin-bottom: 16px;
    }
    
    .error-title {
      font-size: 20px;
      font-weight: 700;
      color: #dc2626;
      margin-bottom: 8px;
    }
    
    .error-message {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    
    .btn-back {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: white;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    
    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(22, 101, 52, 0.2);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <!-- 로딩 상태 -->
    <div id="loading-state">
      <div class="spinner"></div>
      <h1 class="callback-title">카카오 로그인 중...</h1>
      <p class="callback-message">잠시만 기다려주세요</p>
    </div>
    
    <!-- 에러 상태 -->
    <div id="error-state" class="error-container">
      <div class="error-icon">✕</div>
      <h1 class="error-title">로그인 실패</h1>
      <p class="error-message" id="error-text">로그인 처리 중 오류가 발생했습니다</p>
      <a href="/pages/login.html" class="btn-back">로그인 페이지로 돌아가기</a>
    </div>
  </div>
  
  <script type="module">
    import { handleKakaoLogin, showError } from '../../shared/js/auth.js';
    
    // URL에서 인가 코드 추출
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');
    
    // 에러 처리
    if (error) {
      showErrorState('카카오 로그인이 취소되었습니다');
      return;
    }
    
    // 인가 코드 없음
    if (!code) {
      showErrorState('인가 코드가 없습니다');
      return;
    }
    
    // 카카오 로그인 처리
    (async () => {
      try {
        const redirectUri = `${window.location.origin}/pages/auth/kakao-callback.html`;
        await handleKakaoLogin(code, redirectUri);
        // handleKakaoLogin에서 자동으로 대시보드로 리다이렉트됨
      } catch (err) {
        console.error('카카오 로그인 실패:', err);
        showErrorState(err.message || '카카오 로그인에 실패했습니다');
      }
    })();
    
    // 에러 상태 표시
    function showErrorState(message) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').classList.add('show');
      document.getElementById('error-text').textContent = message;
    }
  </script>
</body>
</html>
